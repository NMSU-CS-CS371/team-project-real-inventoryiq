<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InventoryIQ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #f5f4f0;
            --surface:     #ffffff;
            --surface-2:   #f0efe9;
            --ink:         #16150f;
            --ink-muted:   #7a7870;
            --accent:      #1a1a1a;
            --accent-alt:  #d94f3d;
            --border:      #e2e0d8;
            --nav-bg:      #16150f;
            --nav-ink:     #f5f4f0;
            --radius:      10px;
            --radius-lg:   16px;
            --shadow-sm:   0 1px 3px rgba(22,21,15,.06), 0 1px 2px rgba(22,21,15,.04);
            --shadow-md:   0 4px 16px rgba(22,21,15,.08), 0 1px 4px rgba(22,21,15,.04);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .app-nav {
            background: var(--nav-bg);
            padding: 0 1.5rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }

        .app-nav .brand {
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .app-nav .brand img {
            height: 75px;
            width: auto;
            display: block;
            mix-blend-mode: screen;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: .25rem;
        }

        .nav-links a {
            color: rgba(245,244,240,.65);
            text-decoration: none;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .03em;
            text-transform: uppercase;
            padding: .35rem .75rem;
            border-radius: 6px;
            transition: color .15s, background .15s;
        }

        .nav-links a:hover {
            color: var(--nav-ink);
            background: rgba(255,255,255,.08);
        }

        .nav-links a.logout-btn {
            color: rgba(217,79,61,.8);
            border: 1px solid rgba(217,79,61,.25);
        }

        .nav-links a.logout-btn:hover {
            color: #fff;
            background: var(--accent-alt);
            border-color: var(--accent-alt);
        }

        /* ── Layout ── */
        .app-container {
            max-width: 1060px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* ── Alerts ── */
        .alert {
            border: none;
            border-radius: var(--radius);
            font-size: .875rem;
            font-weight: 500;
            border-left: 3px solid currentColor;
        }

        .alert-success { background: #eef8f1; color: #1d6438; }
        .alert-danger  { background: #fdf0ee; color: #a0341f; }
        .alert-warning { background: #fdf8ed; color: #8a6014; }
        .alert-info    { background: #eef4fd; color: #1d4f8a; }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        /* ── List groups ── */
        .list-group { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
        .list-group-item {
            border: none;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-size: .9rem;
            transition: background .12s;
        }

        .list-group-item:last-child { border-bottom: none; }
        .list-group-item-action:hover { background: var(--surface-2); }

        /* ── Buttons ── */
        .btn {
            font-family: 'Sora', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .02em;
            border-radius: 8px;
            padding: .45rem 1rem;
            transition: all .15s;
            border-width: 1.5px;
        }

        .btn-lg { font-size: .9rem; padding: .65rem 1.25rem; }

        .btn-dark {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--nav-ink);
        }

        .btn-dark:hover {
            background: #2e2d26;
            border-color: #2e2d26;
        }

        .btn-danger {
            background: var(--accent-alt);
            border-color: var(--accent-alt);
        }

        .btn-outline-secondary {
            color: var(--ink-muted);
            border-color: var(--border);
        }

        .btn-outline-secondary:hover {
            background: var(--surface-2);
            border-color: #c8c6bd;
            color: var(--ink);
        }

        .btn-outline-danger {
            color: var(--accent-alt);
            border-color: rgba(217,79,61,.3);
        }

        .btn-outline-danger:hover {
            background: var(--accent-alt);
            border-color: var(--accent-alt);
            color: #fff;
        }

        .btn-sm { font-size: .75rem; padding: .3rem .7rem; border-radius: 6px; }

        /* ── Forms ── */
        .form-control, .form-select {
            font-family: 'Sora', sans-serif;
            font-size: .875rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--ink);
            padding: .55rem .9rem;
            transition: border-color .15s, box-shadow .15s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(22,21,15,.08);
            background: var(--surface);
        }

        .form-label {
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .03em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: .4rem;
        }

        /* ── Typography ── */
        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -.02em;
            color: var(--ink);
        }

        h3 { font-weight: 700; letter-spacing: -.01em; }

        h4 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -.01em;
            color: var(--ink);
        }

        .text-muted { color: var(--ink-muted) !important; }

        /* ── Badges ── */
        .badge {
            font-family: 'DM Mono', monospace;
            font-size: .68rem;
            font-weight: 500;
            letter-spacing: .04em;
            border-radius: 5px;
            padding: .25em .55em;
        }

        .bg-danger { background-color: var(--accent-alt) !important; }

        /* ── Page header strip ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── Stat cards ── */
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem 1.25rem;
            text-align: center;
            transition: box-shadow .15s;
        }

        .stat-card:hover { box-shadow: var(--shadow-md); }

        .stat-card .stat-number {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            font-family: 'DM Mono', monospace;
        }

        .stat-card .stat-label {
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: .4rem;
        }

        .stat-card.danger-card {
            border-color: rgba(217,79,61,.25);
            background: #fdf8f7;
        }

        .stat-card.danger-card .stat-number { color: var(--accent-alt); }

        /* ── Quantity display ── */
        .qty-display {
            font-family: 'DM Mono', monospace;
            font-size: .85rem;
            font-weight: 500;
        }

        /* ── Responsive tweaks ── */
        @media (max-width: 576px) {
            .app-container { padding: 1.5rem 1rem 3rem; }
            h2 { font-size: 1.3rem; }
            .app-nav { padding: 0 1rem; }
        }
    </style>
</head>
