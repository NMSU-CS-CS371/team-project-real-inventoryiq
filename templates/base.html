<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InventoryIQ{% endblock %}</title>
    <!-- Bootstrap 5 for mobile-friendly layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; font-size: 1.4rem; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .badge-low-stock { background-color: #dc3545; }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="{% url 'dashboard' %}">InventoryIQ</a>
        <div class="d-flex gap-3">
            <a href="{% url 'product_list' %}" class="btn btn-outline-light btn-sm">Products</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </nav>
    {% endif %}

    <div class="container py-4">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
