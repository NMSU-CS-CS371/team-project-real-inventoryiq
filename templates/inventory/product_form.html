{% extends 'base.html' %}
{% block title %}{{ action }} Product — InventoryIQ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <h2 class="mb-4">{{ action }} Product</h2>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-dark flex-fill btn-lg">Save</button>
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary flex-fill btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
